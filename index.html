  <style>
    * { box-sizing: border-box; }
    body {

      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #172033;
      background:

    }
    .gate {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .panel {
      width: min(430px, 100%);
      padding: 28px;
      border: 1px solid rgba(23, 32, 51, .12);
      border-radius: 10px;
      background: rgba(255, 255, 255, .88);
      box-shadow: 0 22px 55px rgba(21, 33, 54, .16);

      font-size: 25px;
      line-height: 1.22;
      letter-spacing: 0;
    }
    p {

      color: #667085;
      line-height: 1.55;
      font-size: 14px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 14px;
    }
    input {
      width: 100%;
      height: 44px;
      padding: 0 12px;
      border: 1px solid #c9d1df;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      background: #fff;
    }
    input:focus {
      border-color: #255f85;
      box-shadow: 0 0 0 3px rgba(37, 95, 133, .13);
    }
    button {
      width: 100%;
      height: 44px;
      margin-top: 14px;
      border: 0;
      border-radius: 8px;
      background: #172033;
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled {
      opacity: .62;
      cursor: default;
    }
    .error {
      min-height: 20px;
      margin-top: 10px;
      color: #b33a3a;
      font-size: 13px;
    }
    iframe {
      display: block;
      width: 100vw;
      height: 100vh;
      border: 0;
      background: white;
    }
  </style>
</head>

    const decoder = new TextDecoder();

    function b64ToBytes(value) {
      const raw = atob(value);
      const bytes = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
      return bytes;
    }

    async function decrypt(password) {
      const keyMaterial = await crypto.subtle.importKey(
        'raw',
        new TextEncoder().encode(password),
        'PBKDF2',
        false,
        ['deriveKey']
      );
      const key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: b64ToBytes(payload.salt), iterations: payload.iterations, hash: 'SHA-256' },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );
      const encrypted = b64ToBytes(payload.data);
      const tag = b64ToBytes(payload.tag);
      const combined = new Uint8Array(encrypted.length + tag.length);
      combined.set(encrypted);
      combined.set(tag, encrypted.length);
      const plain = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: b64ToBytes(payload.iv), tagLength: 128 },
        key,
        combined
      );
      return decoder.decode(plain);
    }

    document.getElementById('form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const button = document.getElementById('unlock');
      const error = document.getElementById('error');
      button.disabled = true;
      error.textContent = '';
      try {
        const html = await decrypt(document.getElementById('password').value);
        const iframe = document.createElement('iframe');
        iframe.srcdoc = html;
        document.body.replaceChildren(iframe);
      } catch (err) {
        error.textContent = '密码不对，再试一次。';
        button.disabled = false;
      }
    });
